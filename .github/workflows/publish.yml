name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:       # manual trigger for TestPyPI dry-runs

permissions:
  contents: read
  id-token: write          # OIDC for trusted publishing

jobs:
  # ── Build source distribution ──────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Eigen
        run: sudo apt-get install -y libeigen3-dev
      - name: Build sdist
        run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Build wheels via cibuildwheel ──────────────────────────────────
  wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Eigen install (header-only, needed at compile time)
      - name: Install Eigen (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libeigen3-dev

      - name: Install Eigen (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen

      - name: Install Eigen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.zip" -OutFile eigen.zip
          Expand-Archive eigen.zip -DestinationPath C:\eigen
          echo "EIGEN_INCLUDE_DIR=C:\eigen\eigen-3.4.0" >> $env:GITHUB_ENV

      - uses: pypa/cibuildwheel@v2.22
        env:
          # Python versions to build
          CIBW_BUILD: cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          # Use manylinux_2_28 so pre-built scipy wheels are available
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          # Eigen is pre-installed on the host; manylinux needs it inside container
          CIBW_BEFORE_BUILD_LINUX: >-
            dnf install -y eigen3-devel 2>/dev/null ||
            apt-get install -y libeigen3-dev 2>/dev/null || true
          CIBW_TEST_REQUIRES: pytest pytest-benchmark hypothesis numpy scipy matplotlib
          CIBW_TEST_COMMAND: python -m pytest {project}/tests -q -x -m "not perf and not octave" --ignore={project}/tests/test_octave_parity_smoke.py --ignore={project}/tests/test_rms_regression.py --ignore={project}/tests/test_cost.py --ignore={project}/tests/test_mean.py --ignore={project}/tests/test_rotate.py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── Publish to PyPI ────────────────────────────────────────────────
  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment: pypi          # configure trusted publisher in this environment
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/project/vbpca-py/settings/publishing/
