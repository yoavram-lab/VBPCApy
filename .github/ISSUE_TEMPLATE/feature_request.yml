name: Feature request
description: Suggest new functionality or an enhancement to existing behaviour
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behaviour you'd like to see.
      placeholder: |
        ```python
        # Example usage of the proposed feature
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're less ideal.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related issues, papers, or external implementations.
    validations:
      required: false
