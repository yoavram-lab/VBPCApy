name: Bug report
description: Report a crash, incorrect result, or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to trigger the bug.
      placeholder: |
        ```python
        from vbpca_py import VBPCA
        model = VBPCA(X, d=3)
        model.fit(maxiters=100)
        # crash or wrong result here
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened (paste the traceback if applicable).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, VBPCApy version, OS, and any relevant packages.
      placeholder: |
        - Python: 3.12.x
        - VBPCApy: 0.1.1
        - OS: macOS / Ubuntu / Windows
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (data shape, missing-data fraction, ARD settings, etc.).
    validations:
      required: false
