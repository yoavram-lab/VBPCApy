[build-system]
requires = ["setuptools", "wheel", "pybind11"]
build-backend = "setuptools.build_meta"

[project]
name = "vbpca_py"
version = "0.1.0"
description = "A Python package for performing probabilistic PCA with support for missing data."
authors = [{ name = "Shany", email = "shany215.sn@gmail.com" }]
dependencies = [
    "numpy>=1.21.0",
    "pandas>=1.3.0",
    "scipy>=1.7.0",
    "matplotlib>=3.4.0"
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["vbpca_py*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.black]
line-length = 88